name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx turbo lint

      - name: Test
        run: npx turbo test

      - name: Build
        run: npx turbo build

      - name: Check bundle size
        run: |
          BUNDLE_SIZE=$(find apps/web/out -name "*.js" -exec wc -c {} + | tail -1 | awk '{print $1}')
          MAX_SIZE=$((500 * 1024))
          echo "Total JS size: $BUNDLE_SIZE bytes"
          if [ "$BUNDLE_SIZE" -gt "$MAX_SIZE" ]; then
            echo "Bundle size $BUNDLE_SIZE exceeds 500KB limit"
            exit 1
          fi
